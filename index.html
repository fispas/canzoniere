<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Canzoniere</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#161310">
<style>
  /* [Mantenuti i tuoi stili originali per brevità, sono corretti] */
  :root{
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Charter",Georgia,"Times New Roman",serif;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    --mono:ui-monospace,"SF Mono","Menlo","Consolas","Liberation Mono",monospace;
    --r:10px; --fs:1;
  }
  [data-theme="stage"]{
    --bg:#161310; --surface:#1e1b16; --surface2:#262119; --line:#352f25;
    --text:#f1ead9; --muted:#9c9180; --faint:#6f675a;
    --chord:#f0b65c; --accent:#e0a23e; --accent-ink:#1a160f; --section:#7fb0a8;
    --shadow:0 8px 30px rgba(0,0,0,.45);
  }
  [data-theme="paper"]{
    --bg:#f3eee2; --surface:#fbf7ee; --surface2:#efe8d9; --line:#e2d9c6;
    --text:#26221a; --muted:#857c6b; --faint:#a99f8b;
    --chord:#b06a16; --accent:#9a5712; --accent-ink:#fff7ea; --section:#2f7367;
    --shadow:0 6px 22px rgba(80,64,40,.14);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--sans); -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; overflow:hidden;
  }
  button{font-family:inherit; cursor:pointer; color:inherit}
  
  .chrome{ display:flex; align-items:center; gap:10px; padding:10px 16px; flex-wrap:wrap; background:var(--surface); border-bottom:1px solid var(--line); flex:0 0 auto; }
  .brand{display:flex; align-items:baseline; gap:10px; margin-right:auto}
  .brand b{font-family:var(--serif); font-weight:600; font-size:1.35rem; letter-spacing:.2px}
  .brand .glow{color:var(--accent)}
  .brand small{color:var(--muted); font-size:.72rem; text-transform:uppercase; letter-spacing:.22em}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:999px; overflow:hidden; background:var(--surface2)}
  .seg button{border:0; background:transparent; padding:7px 13px; font-size:.82rem; color:var(--muted)}
  .seg button[aria-pressed="true"]{background:var(--accent); color:var(--accent-ink); font-weight:600}
  .icobtn{border:1px solid var(--line); background:var(--surface2); border-radius:999px; padding:7px 14px; font-size:.85rem; display:inline-flex; align-items:center; gap:7px}
  .icobtn.primary{background:var(--accent); color:var(--accent-ink); border-color:var(--accent); font-weight:600}

  .stage{display:flex; flex:1 1 auto; min-height:0}
  .sidebar{ flex:0 0 288px; background:var(--surface); border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0; }
  .search{padding:12px}
  .search input{ width:100%; padding:10px 12px; border-radius:var(--r); border:1px solid var(--line); background:var(--bg); color:var(--text); font-size:.9rem; }
  
  .list{overflow:auto; padding:8px; flex:1 1 auto}
  .item{ width:100%; text-align:left; border:0; background:transparent; border-radius:var(--r); padding:11px 12px; margin-bottom:2px; border-left:3px solid transparent; cursor:pointer;}
  .item:hover{background:var(--surface2)}
  .item.active{background:var(--surface2); border-left-color:var(--accent)}
  .item .t{font-family:var(--serif); font-size:1.02rem}
  .item .m{font-size:.78rem; color:var(--muted)}

  .main{flex:1 1 auto; display:flex; flex-direction:column; min-height:0; min-width:0}
  .toolbar{ display:flex; align-items:center; gap:8px 12px; flex-wrap:wrap; padding:10px 18px; border-bottom:1px solid var(--line); background:var(--surface); }
  .reading{flex:1 1 auto; overflow:auto; padding:34px clamp(18px,6vw,80px) 40vh}
  .sheet{max-width:760px; margin:0 auto}

  .lines{font-size:calc(1.06rem * var(--fs)); line-height:1.32}
  .ch{font-family:var(--mono); font-weight:700; color:var(--chord); font-size:.82em}
  .cl{display:flex; flex-wrap:wrap; align-items:flex-end; row-gap:.18em}
  .cell{display:inline-flex; flex-direction:column; margin-left:.5ch}
  
  .editor{position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; z-index:100}
  .epanes{flex:1; display:flex; min-height:0}
  .epane{flex:1; display:flex; flex-direction:column; border-right:1px solid var(--line)}
  .epane textarea{flex:1; padding:20px; background:transparent; color:var(--text); border:0; font-family:var(--mono); font-size:1rem; outline:none; resize:none}

  /* Responsive Mobile */
  @media (max-width:760px){
    .sidebar{position:fixed; left:0; top:60px; bottom:0; width:80%; transform:translateX(-100%); transition:0.3s; z-index:50}
    body.nav-open .sidebar{transform:translateX(0)}
    .menu-btn{display:block !important}
  }
  .menu-btn{display:none}
</style>
</head>
<body data-theme="stage">

<div class="chrome">
  <button class="icobtn menu-btn" id="menuBtn">☰</button>
  <div class="brand"><b>Canzo<span class="glow">niere</span></b></div>

  <div class="seg">
    <button id="notEn">C D E</button>
    <button id="notIt">Do Re Mi</button>
  </div>
  <div class="seg">
    <button id="thStage">Palco</button>
    <button id="thPaper">Carta</button>
  </div>
  <button class="icobtn" id="searchOnlineBtn">🔎 Cerca Online</button>
  <button class="icobtn primary" id="newBtn">+ Nuova</button>
</div>

<div class="stage">
  <aside class="sidebar" id="sidebar">
    <div class="search"><input id="search" type="search" placeholder="Cerca brano o artista..."></div>
    <div style="padding:0 12px 10px; display:flex; gap:5px">
        <button class="icobtn" id="newFolderBtn" style="flex:1; font-size:0.7rem">+ Cartella</button>
        <button class="icobtn" id="exportDbBtn" style="flex:1; font-size:0.7rem">Backup</button>
    </div>
    <div class="list" id="list"></div>
  </aside>

  <main class="main">
    <div class="toolbar" id="toolbar" style="display:none">
      <div class="seg">
        <button id="trDown">−</button>
        <div id="keyVal" style="padding:0 10px; display:flex; align-items:center; font-family:var(--mono)">—</div>
        <button id="trUp">+</button>
      </div>
      <button class="icobtn" id="saveKeyBtn">💾 Salva Tonalità</button>
      <button class="icobtn" id="editBtn">Modifica</button>
      <button class="icobtn" id="deleteBtn" style="color:#ff6b6b">Elimina</button>
      <select id="folderSelect" class="icobtn" style="background:var(--surface2)"></select>
    </div>

    <div class="reading" id="reading">
      <div id="blank" style="text-align:center; padding-top:100px; color:var(--muted)">
        <h2>Benvenuto</h2>
        <p>Seleziona una canzone o creane una nuova.</p>
      </div>
      <div class="sheet" id="sheet" style="display:none"></div>
    </div>
  </main>
</div>

<!-- Editor -->
<div class="editor" id="editor" style="display:none">
  <div class="chrome">
    <input id="edTitleField" type="text" placeholder="Titolo" style="background:transparent; border:1px solid var(--line); color:white; padding:5px 10px; border-radius:5px">
    <input id="edArtistField" type="text" placeholder="Artista" style="background:transparent; border:1px solid var(--line); color:white; padding:5px 10px; border-radius:5px">
    <button class="icobtn" id="edConvert">↻ Converti</button>
    <button class="icobtn" id="edCancel">Annulla</button>
    <button class="icobtn primary" id="edSave">Salva</button>
  </div>
  <div class="epanes">
    <div class="epane">
      <textarea id="edText" placeholder="Incolla qui testo e accordi..."></textarea>
    </div>
  </div>
</div>

<script>
"use strict";
const $ = s => document.querySelector(s);

// --- DB & STATE ---
let db;
let songs = [], folders = [], settings = { theme:"stage", notation:"en", fs:1 };
let currentId = null;

async function init() {
    // IndexedDB
    db = await new Promise(resolve => {
        const req = indexedDB.open("CanzoniereDB", 1);
        req.onupgradeneeded = e => {
            const db = e.target.result;
            db.createObjectStore("store");
        };
        req.onsuccess = e => resolve(e.target.result);
    });

    // Load Data
    songs = await dbGet("songs") || [];
    folders = await dbGet("folders") || [];
    settings = await dbGet("settings") || settings;

    applySettings();
    renderList();
    setupEvents();
    
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
}

async function dbGet(k) {
    return new Promise(r => {
        const req = db.transaction("store").objectStore("store").get(k);
        req.onsuccess = () => r(req.result);
    });
}
async function dbSet(k, v) {
    return new Promise(r => {
        const tx = db.transaction("store", "readwrite");
        tx.objectStore("store").put(v, k);
        tx.oncomplete = r;
    });
}

// --- LOGIC ---
const SHARP = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLAT  = ["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"];
const IT = {C:"Do",D:"Re",E:"Mi",F:"Fa",G:"Sol",A:"La",B:"Si"};

function transposeChord(ch, semis) {
    if(!ch) return ch;
    const m = ch.match(/^([A-G])([#b]?)(.*)$/);
    if(!m) return ch;
    const root = m[1] + m[2];
    const rest = m[3];
    let idx = SHARP.indexOf(root);
    if(idx === -1) idx = FLAT.indexOf(root);
    if(idx === -1) return ch;
    const newRoot = SHARP[((idx + semis) % 12 + 12) % 12];
    return newRoot + rest;
}

function formatChord(ch) {
    if(settings.notation === "en") return ch;
    return ch.replace(/([A-G])([#b]?)/g, (m, r, a) => IT[r] + (a||""));
}

function parseChordPro(content, offset = 0) {
    let html = "";
    content.split("\n").forEach(line => {
        if(line.startsWith("{") || line.trim() === "") return;
        const matches = [...line.matchAll(/\[([^\]]+)\]/g)];
        if(matches.length === 0) {
            html += `<div class="ly">${line || "&nbsp;" }</div>`;
        } else {
            html += `<div class="cl">`;
            let lastPos = 0;
            matches.forEach(m => {
                const textBefore = line.substring(lastPos, m.index);
                const chord = formatChord(transposeChord(m[1], offset));
                html += `<span class="cell"><span class="ch">${chord}</span><span class="wd">${textBefore || "&nbsp;"}</span></span>`;
                lastPos = m.index + m[0].length;
            });
            html += `<span class="cell"><span class="ch"></span><span class="wd">${line.substring(lastPos)}</span></span></div>`;
        }
    });
    return html;
}

function renderList() {
    const q = $("#search").value.toLowerCase();
    const listEl = $("#list");
    listEl.innerHTML = "";

    // Gruppo per cartelle
    const groups = { "none": [] };
    folders.forEach(f => groups[f.id] = []);
    
    songs.forEach(s => {
        if(q && !s.title.toLowerCase().includes(q)) return;
        const fid = s.folderId || "none";
        if(groups[fid]) groups[fid].push(s);
    });

    Object.keys(groups).forEach(fid => {
        const folderSongs = groups[fid];
        if(fid !== "none") {
            const f = folders.find(x => x.id === fid);
            const fdiv = document.createElement("div");
            fdiv.innerHTML = `<div style="padding:10px; font-size:0.7rem; color:var(--accent); font-weight:bold; display:flex; justify-content:space-between">
                ${f.name.toUpperCase()} <span onclick="deleteFolder('${f.id}')" style="cursor:pointer">✕</span>
            </div>`;
            listEl.appendChild(fdiv);
        }
        folderSongs.sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
            const btn = document.createElement("button");
            btn.className = `item ${s.id === currentId ? 'active' : ''}`;
            btn.innerHTML = `<div class="t">${s.title}</div><div class="m">${s.artist || ''}</div>`;
            btn.onclick = () => openSong(s.id);
            listEl.appendChild(btn);
        });
    });

    // Update folder select
    const sel = $("#folderSelect");
    sel.innerHTML = `<option value="">Senza cartella</option>` + folders.map(f => `<option value="${f.id}">${f.name}</option>`).join("");
}

function openSong(id) {
    currentId = id;
    const s = songs.find(x => x.id === id);
    if(!s) return;
    
    $("#blank").style.display = "none";
    $("#sheet").style.display = "block";
    $("#toolbar").style.display = "flex";
    $("#sheet").innerHTML = `<h1>${s.title}</h1><p style="color:var(--muted)">${s.artist || ''}</p><div class="lines">${parseChordPro(s.content, s.offset || 0)}</div>`;
    $("#keyVal").textContent = s.offset || 0;
    $("#folderSelect").value = s.folderId || "";
    
    document.body.classList.remove("nav-open");
    renderList();
}

function setupEvents() {
    $("#menuBtn").onclick = () => document.body.classList.toggle("nav-open");
    
    $("#search").oninput = renderList;

    $("#newBtn").onclick = () => {
        currentId = null;
        $("#edTitleField").value = "";
        $("#edArtistField").value = "";
        $("#edText").value = "";
        $("#editor").style.display = "flex";
    };

    $("#editBtn").onclick = () => {
        const s = songs.find(x => x.id === currentId);
        if(!s) return;
        $("#edTitleField").value = s.title;
        $("#edArtistField").value = s.artist;
        $("#edText").value = s.content;
        $("#editor").style.display = "flex";
    };

    $("#edSave").onclick = async () => {
        const title = $("#edTitleField").value || "Senza titolo";
        const artist = $("#edArtistField").value;
        const content = $("#edText").value;

        if(currentId) {
            const s = songs.find(x => x.id === currentId);
            s.title = title; s.artist = artist; s.content = content;
        } else {
            const newSong = { id: "s"+Date.now(), title, artist, content, offset: 0 };
            songs.push(newSong);
            currentId = newSong.id;
        }
        await dbSet("songs", songs);
        $("#editor").style.display = "none";
        openSong(currentId);
    };

    $("#edCancel").onclick = () => $("#editor").style.display = "none";

    $("#deleteBtn").onclick = async () => {
        if(!confirm("Eliminare questa canzone?")) return;
        songs = songs.filter(x => x.id !== currentId);
        await dbSet("songs", songs);
        location.reload();
    };

    $("#trUp").onclick = () => shiftKey(1);
    $("#trDown").onclick = () => shiftKey(-1);

    $("#saveKeyBtn").onclick = async () => {
        const s = songs.find(x => x.id === currentId);
        if(!s) return;
        // Trasforma il contenuto applicando l'offset in modo permanente
        s.content = s.content.replace(/\[([^\]]+)\]/g, (m, c) => `[${transposeChord(c, s.offset || 0)}]`);
        s.offset = 0;
        await dbSet("songs", songs);
        openSong(currentId);
        alert("Tonalità salvata nel testo.");
    };

    $("#thStage").onclick = () => setTheme("stage");
    $("#thPaper").onclick = () => setTheme("paper");
    $("#notEn").onclick = () => setNotation("en");
    $("#notIt").onclick = () => setNotation("it");

    $("#newFolderBtn").onclick = async () => {
        const n = prompt("Nome cartella:");
        if(n) {
            folders.push({id: "f"+Date.now(), name: n});
            await dbSet("folders", folders);
            renderList();
        }
    };

    $("#folderSelect").onchange = async (e) => {
        const s = songs.find(x => x.id === currentId);
        if(s) {
            s.folderId = e.target.value;
            await dbSet("songs", songs);
            renderList();
        }
    };

    $("#searchOnlineBtn").onclick = () => {
        const q = prompt("Cerca accordi per:");
        if(q) window.open(`https://www.google.com/search?q=${encodeURIComponent(q + " chords ultimate guitar")}`, "_blank");
    };

    $("#edConvert").onclick = () => {
        // Semplice convertitore euristico
        let text = $("#edText").value;
        const lines = text.split("\n");
        let result = "";
        for(let i=0; i<lines.length; i++) {
            let line = lines[i];
            let nextLine = lines[i+1] || "";
            // Se la riga sembra contenere solo accordi
            if (line.trim() !== "" && line.match(/^[A-G][#b]?m?[0-9]?(\s+[A-G][#b]?m?[0-9]?)*$/)) {
                // Fondi con la riga successiva
                let merged = "";
                let chords = line.split(/(\s+)/);
                let pos = 0;
                chords.forEach(c => {
                    if(c.trim() === "") { pos += c.length; }
                    else {
                        merged += `[${c}]`;
                        pos += c.length;
                    }
                });
                result += merged + nextLine + "\n";
                i++; // Salta riga testo
            } else {
                result += line + "\n";
            }
        }
        $("#edText").value = result;
    };
}

function shiftKey(delta) {
    const s = songs.find(x => x.id === currentId);
    if(!s) return;
    s.offset = (s.offset || 0) + delta;
    openSong(currentId);
}

function setTheme(t) {
    settings.theme = t;
    applySettings();
    dbSet("settings", settings);
}
function setNotation(n) {
    settings.notation = n;
    applySettings();
    dbSet("settings", settings);
}

function applySettings() {
    document.body.setAttribute("data-theme", settings.theme);
    $("#thStage").setAttribute("aria-pressed", settings.theme === "stage");
    $("#thPaper").setAttribute("aria-pressed", settings.theme === "paper");
    $("#notEn").setAttribute("aria-pressed", settings.notation === "en");
    $("#notIt").setAttribute("aria-pressed", settings.notation === "it");
    if(currentId) openSong(currentId);
}

async function deleteFolder(id) {
    if(!confirm("Eliminare cartella? I brani non verranno cancellati.")) return;
    folders = folders.filter(f => f.id !== id);
    songs.forEach(s => { if(s.folderId === id) delete s.folderId; });
    await dbSet("folders", folders);
    await dbSet("songs", songs);
    renderList();
}

init();
</script>
</body>
</html>
